<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Clinik Auto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .navbar {
            background: #333;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 {
            font-size: 24px;
        }
        .logout-btn {
            background: #ff6b6b;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .logout-btn:hover {
            background: #ff5252;
        }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        .header h2 {
            color: #333;
            margin-bottom: 10px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-card h3 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .stat-card p {
            font-size: 14px;
        }
        .appointments-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .appointments-section h3 {
            color: #333;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: bold;
        }
        table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        table tr:hover {
            background: #f9f9f9;
        }
        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-pending {
            background: #ffc107;
            color: #333;
        }
        .badge-confirmed {
            background: #28a745;
            color: white;
        }
        .badge-cancelled {
            background: #dc3545;
            color: white;
        }
        .action-btn {
            padding: 5px 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-confirm {
            background: #28a745;
            color: white;
        }
        .btn-confirm:hover {
            background: #218838;
        }
        .btn-cancel {
            background: #dc3545;
            color: white;
        }
        .btn-cancel:hover {
            background: #c82333;
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        /* Mobile responsive */
        @media (max-width: 1024px) {
            .container {
                padding: 15px;
            }
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 10px 15px;
                flex-direction: column;
                gap: 10px;
            }
            .navbar h1 {
                font-size: 18px;
            }
            .logout-btn {
                width: 100%;
            }
            .container {
                padding: 10px;
            }
            .stats {
                grid-template-columns: 1fr;
            }
            .stat-card h3 {
                font-size: 24px;
            }
            table {
                font-size: 12px;
            }
            table th, table td {
                padding: 8px;
            }
            .action-btn {
                padding: 3px 6px;
                font-size: 10px;
            }
        }

        @media (max-width: 480px) {
            .navbar h1 {
                font-size: 16px;
            }
            .header h2 {
                font-size: 16px;
            }
            .stat-card {
                padding: 15px;
            }
            .stat-card h3 {
                font-size: 20px;
            }
            table th, table td {
                padding: 5px;
                font-size: 10px;
            }
            .action-btn {
                padding: 3px 5px;
                font-size: 9px;
                margin: 2px;
            }
            .badge {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🚗 Clinik Auto - Admin</h1>
        <button class="logout-btn" onclick="logout()">Déconnexion</button>
    </div>

    <div class="container">
        <div class="header">
            <h2>📊 Tableau de bord administrateur</h2>
            <div class="stats">
                <div class="stat-card">
                    <h3 id="totalAppointments">0</h3>
                    <p>RDV au total</p>
                </div>
                <div class="stat-card">
                    <h3 id="pendingAppointments">0</h3>
                    <p>En attente</p>
                </div>
                <div class="stat-card">
                    <h3 id="confirmedAppointments">0</h3>
                    <p>Confirmés</p>
                </div>
            </div>
        </div>

        <div class="appointments-section">
            <h3>📅 Liste des rendez-vous</h3>
            <div id="appointmentsContainer" class="loading">
                Chargement des rendez-vous...
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));

        if (!user) {
            window.location.href = "http://localhost:3000/login";
        }

        async function loadAppointments() {
            try {
                const response = await fetch("http://localhost:3000/all-appointments");
                const appointments = await response.json();

                const container = document.getElementById("appointmentsContainer");

                if (appointments.length === 0) {
                    container.innerHTML = '<div class="no-data">Aucun rendez-vous pour le moment</div>';
                    return;
                }

                const total = appointments.length;
                const pending = appointments.filter(a => a.status !== "confirmed").length;
                const confirmed = appointments.filter(a => a.status === "confirmed").length;

                document.getElementById("totalAppointments").textContent = total;
                document.getElementById("pendingAppointments").textContent = pending;
                document.getElementById("confirmedAppointments").textContent = confirmed;

                let tableHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Client (ID)</th>
                                <th>Service</th>
                                <th>Date</th>
                                <th>Heure</th>
                                <th>Statut</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                appointments.forEach(appointment => {
                    const status = appointment.status || "pending";
                    const badgeClass = status === "confirmed" ? "badge-confirmed" : 
                                      status === "cancelled" ? "badge-cancelled" : "badge-pending";
                    const statusText = status === "confirmed" ? "Confirmé" : 
                                      status === "cancelled" ? "Annulé" : "En attente";

                    tableHTML += `
                        <tr>
                            <td>#${appointment.id}</td>
                            <td>Client ${appointment.user_id}</td>
                            <td>${appointment.service}</td>
                            <td>${appointment.date}</td>
                            <td>${appointment.time}</td>
                            <td><span class="badge ${badgeClass}">${statusText}</span></td>
                            <td>
                                ${status !== "confirmed" ? `<button class="action-btn btn-confirm" onclick="confirmAppointment(${appointment.id})">✓ Valider</button>` : ''}
                                ${status !== "cancelled" ? `<button class="action-btn btn-cancel" onclick="cancelAppointment(${appointment.id})">✕ Annuler</button>` : ''}
                            </td>
                        </tr>
                    `;
                });

                tableHTML += `
                        </tbody>
                    </table>
                `;

                container.innerHTML = tableHTML;

            } catch (error) {
                document.getElementById("appointmentsContainer").innerHTML = 
                    '<div class="no-data">❌ Erreur lors du chargement des rendez-vous</div>';
                console.error("Erreur:", error);
            }
        }

        async function confirmAppointment(appointmentId) {
            try {
                const response = await fetch(`http://localhost:3000/appointment/${appointmentId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ status: "confirmed" })
                });

                if (response.ok) {
                    alert("✅ Rendez-vous confirmé !");
                    loadAppointments();
                } else {
                    alert("❌ Erreur lors de la confirmation");
                }
            } catch (error) {
                alert("❌ Erreur de connexion");
                console.error("Erreur:", error);
            }
        }

        async function cancelAppointment(appointmentId) {
            if (confirm("Êtes-vous sûr de vouloir annuler ce rendez-vous ?")) {
                try {
                    const response = await fetch(`http://localhost:3000/appointment/${appointmentId}`, {
                        method: "PUT",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ status: "cancelled" })
                    });

                    if (response.ok) {
                        alert("✅ Rendez-vous annulé !");
                        loadAppointments();
                    } else {
                        alert("❌ Erreur lors de l'annulation");
                    }
                } catch (error) {
                    alert("❌ Erreur de connexion");
                    console.error("Erreur:", error);
                }
            }
        }

        function logout() {
            localStorage.removeItem("user");
            window.location.href = "http://localhost:3000/login";
        }

        loadAppointments();
        setInterval(loadAppointments, 10000);
    </script>
</body>
</html>
