openapi: 3.0.3
info:
  title: ClinikAuto CRM API (partial)
  version: 0.1.0
  description: Minimal OpenAPI spec for `clients` and `vehicles` endpoints (Phase 1)

servers:
  - url: http://localhost:3000

paths:
  /api/clients:
    get:
      summary: List clients (paginated)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            default: 25
      responses:
        '200':
          description: Paginated clients list
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Client'
    post:
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCreate'
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'

  /api/clients/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    get:
      summary: Get client by id
      responses:
        '200':
          description: Client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '404':
          description: Not found
    put:
      summary: Update client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCreate'
      responses:
        '200':
          description: Updated client
    delete:
      summary: Delete client
      responses:
        '200':
          description: Deletion result

  /api/vehicles:
    get:
      summary: List vehicles (paginated)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            default: 25
      responses:
        '200':
          description: Paginated vehicles list
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Vehicle'
    post:
      summary: Create a vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleCreate'
      responses:
        '201':
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'

  /api/vehicles/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    get:
      summary: Get vehicle by id
      responses:
        '200':
          description: Vehicle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          description: Not found
    put:
      summary: Update vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleCreate'
      responses:
        '200':
          description: Updated vehicle
    delete:
      summary: Delete vehicle
      responses:
        '200':
          description: Deletion result

components:
  schemas:
    Client:
      type: object
      properties:
        id:
          type: integer
        nom:
          type: string
        prenom:
          type: string
        email:
          type: string
        tel:
          type: string
        adresse:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time

    ClientCreate:
      type: object
      properties:
        nom:
          type: string
        prenom:
          type: string
        email:
          type: string
        tel:
          type: string
        adresse:
          type: string
        notes:
          type: string
      required: [email]

    Vehicle:
      type: object
      properties:
        id:
          type: integer
        client_id:
          type: integer
        marque:
          type: string
        modele:
          type: string
        annee:
          type: string
        immatriculation:
          type: string
        vin:
          type: string
        km:
          type: integer
        notes:
          type: string
        created_at:
          type: string
          format: date-time

    VehicleCreate:
      type: object
      properties:
        client_id:
          type: integer
        marque:
          type: string
        modele:
          type: string
        annee:
          type: string
        immatriculation:
          type: string
        vin:
          type: string
        km:
          type: integer
        notes:
          type: string
