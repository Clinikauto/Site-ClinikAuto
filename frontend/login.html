<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Clinik Auto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #764ba2;
        }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .message.show {
            display: block;
        }
        .signup-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .signup-link a:hover {
            text-decoration: underline;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 20px;
            }
            input, button {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }
            h1 {
                font-size: 18px;
            }
            input, button {
                padding: 10px !important;
                font-size: 14px;
            }
            label {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Connexion</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email :</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe :</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Se connecter</button>
        </form>
        <div class="message" id="message"></div>
        <div class="signup-link">
            Pas encore inscrit ? <a href="/register">S'inscrire ici</a>
        </div>
    </div>

    <script>
        // Détecter ?admin=1 dans l'URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get("admin") === "1") {
            const adminGroup = document.createElement("div");
            adminGroup.className = "form-group";
            adminGroup.id = "adminCodeGroup";

            const label = document.createElement("label");
            label.setAttribute("for", "adminCode");
            label.textContent = "Code administrateur :";

            const input = document.createElement("input");
            input.type = "password";
            input.id = "adminCode";
            input.name = "adminCode";
            input.placeholder = "Code admin (optionnel)";

            adminGroup.appendChild(label);
            adminGroup.appendChild(input);
            const submitBtn = document.querySelector("#loginForm button[type=submit]");
            if (submitBtn) {
                document.getElementById("loginForm").insertBefore(adminGroup, submitBtn);
            } else {
                document.getElementById("loginForm").appendChild(adminGroup);
            }
        }

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const messageDiv = document.getElementById("message");
            const adminCodeInput = document.getElementById("adminCode");

            try {
                const response = await fetch("/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.textContent = "✅ Connexion réussie ! Bienvenue " + data.user.email;
                    messageDiv.className = "message success show";

                    localStorage.setItem("user", JSON.stringify(data.user));

                    if (adminCodeInput && adminCodeInput.value.trim() !== "") {
                        try {
                            const adminRes = await fetch("/admin-login", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ code: adminCodeInput.value.trim() })
                            });
                            if (adminRes.ok) {
                                localStorage.setItem("isAdmin", "true");
                                sessionStorage.setItem("adminToken", adminCodeInput.value.trim());
                                setTimeout(() => { window.location.href = "/admin"; }, 1500);
                            } else {
                                localStorage.removeItem("isAdmin");
                                sessionStorage.removeItem("adminToken");
                                setTimeout(() => { window.location.href = "/dashboard"; }, 1500);
                            }
                        } catch {
                            setTimeout(() => { window.location.href = "/dashboard"; }, 1500);
                        }
                    } else {
                        setTimeout(() => {
                            window.location.href = "/dashboard";
                        }, 1500);
                    }
                } else {
                    messageDiv.textContent = "❌ " + data.error;
                    messageDiv.className = "message error show";
                }
            } catch (error) {
                messageDiv.textContent = "❌ Erreur de connexion au serveur";
                messageDiv.className = "message error show";
                console.error("Erreur:", error);
            }
        });
    </script>
</body>
</html>
