version: "3.8"

services:
  app:
    build: .
    image: clinikauto-app:latest
    container_name: clinikauto_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./deploy/.env.example
    volumes:
      - ./backend/database.db:/usr/src/app/backend/database.db
      - ./backups:/usr/src/app/backups
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
